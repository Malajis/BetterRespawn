# ========================================
#         BetterRespawn 配置文件
# ========================================

# 是否启用插件核心功能
# true:  启用原地复活 + 飞行 + 倒计时
# false: 禁用，使用默认重生机制
enable-feature: true

# 是否自动重生
# true:  死亡后自动复活，无需手动点击
# false: 需要玩家手动点击"重新生成"按钮
auto-respawn: true

# 复活倒计时时间（秒）
# 玩家复活后飞行的无敌时间
# 建议值: 3-10 秒
respawn-time: 5

# 死亡时扣除的经验比例
# 取值范围: 0.0 - 1.0
# 示例:
#   0.0 = 不扣除经验
#   0.25 = 扣除 25% 经验（100级 -> 75级）
#   1.0 = 扣除全部经验
experience-cost: 0.25
