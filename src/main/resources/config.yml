# ========================================
# BetterRespawn 插件配置文件
# ========================================

# 是否启用插件核心功能
# true:  原地复活 + 飞行 + 倒计时
# false: 正常重生到床或世界重生点
enable-feature: false

# 是否自动重生
# true:  死亡后自动复活，无需手动点击
# false: 需要玩家手动点击重生
auto-respawn: true

# 倒计时时间（秒）
# 玩家复活后需要等待的时间才能正常交互
respawn-time: 5

# 复活时扣除的等级比例
# 取值范围：0.0 - 1.0
# 例如：0.25 表示扣除 25% 的等级
#       100级死亡后剩余 75级
experience-cost: 0.25
